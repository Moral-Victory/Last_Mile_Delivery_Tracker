<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Basic Delivery Tracker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background-color: #f4f4f9;
      color: #333;
    }
    header {
      background-color: #3b5998;
      color: white;
      padding: 15px;
      text-align: center;
      margin-bottom: 20px;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }
    input, select {
      width: 100%;
      padding: 8px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      background-color: #4CAF50;
      color: white;
      padding: 10px 15px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover {
      background-color: #45a049;
    }
    .btn-delete {
      background-color: #f44336;
    }
    .btn-delete:hover {
      background-color: #da190b;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: left;
    }
    th {
      background-color: #f2f2f2;
    }
    .edit-select {
      width: auto;
      padding: 4px;
    }
  </style>
</head>
<body>

  <header>
    <h1>Basic Delivery Tracker</h1>
    <p>Simple static delivery dashboard using local browser storage</p>
  </header>

  <div class="container">
    <h2>Add New Order</h2>
    <form id="orderForm">
      <div class="form-group">
        <label for="pickup">Pickup Address</label>
        <input type="text" id="pickup" required placeholder="e.g. 123 Main St">
      </div>
      <div class="form-group">
        <label for="dropoff">Dropoff Address</label>
        <input type="text" id="dropoff" required placeholder="e.g. 456 Elm St">
      </div>
      <div class="form-group">
        <label for="weight">Weight (Kg)</label>
        <input type="number" id="weight" step="0.1" required placeholder="e.g. 2.5">
      </div>
      <div class="form-group">
        <label for="status">Initial Status</label>
        <select id="status">
          <option value="Pending">Pending</option>
          <option value="In Transit">In Transit</option>
          <option value="Delivered">Delivered</option>
        </select>
      </div>
      <button type="submit">Create Order</button>
    </form>

    <hr style="margin: 30px 0;">

    <h2>Order List</h2>
    <table>
      <thead>
        <tr>
          <th>Order ID</th>
          <th>Pickup Address</th>
          <th>Dropoff Address</th>
          <th>Weight (Kg)</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="orderTableBody">
        <!-- Orders will be loaded here -->
      </tbody>
    </table>
  </div>

  <script>
    // State management using localStorage
    let orders = JSON.parse(localStorage.getItem('basic_orders')) || [
      { id: "ORD001", pickup: "123 Main St", dropoff: "456 Elm St", weight: 2.5, status: "Pending" },
      { id: "ORD002", pickup: "789 Pine Rd", dropoff: "101 Maple Ave", weight: 1.2, status: "In Transit" }
    ];

    // Save orders list helper
    function saveOrders() {
      localStorage.setItem('basic_orders', JSON.stringify(orders));
      renderOrders();
    }

    // Render list in the table
    function renderOrders() {
      const tbody = document.getElementById('orderTableBody');
      tbody.innerHTML = '';

      orders.forEach((order, index) => {
        tbody.innerHTML += `
          <tr>
            <td>${order.id}</td>
            <td>${order.pickup}</td>
            <td>${order.dropoff}</td>
            <td>${order.weight}</td>
            <td>
              <select class="edit-select" onchange="updateStatus(${index}, this.value)">
                <option value="Pending" ${order.status === 'Pending' ? 'selected' : ''}>Pending</option>
                <option value="In Transit" ${order.status === 'In Transit' ? 'selected' : ''}>In Transit</option>
                <option value="Delivered" ${order.status === 'Delivered' ? 'selected' : ''}>Delivered</option>
              </select>
            </td>
            <td>
              <button class="btn-delete" onclick="deleteOrder(${index})">Delete</button>
            </td>
          </tr>
        `;
      });
    }

    // Create operation
    document.getElementById('orderForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const pickup = document.getElementById('pickup').value;
      const dropoff = document.getElementById('dropoff').value;
      const weight = document.getElementById('weight').value;
      const status = document.getElementById('status').value;
      const id = "ORD" + Math.floor(100 + Math.random() * 900);

      orders.push({ id, pickup, dropoff, weight, status });
      saveOrders();

      // Reset form fields
      document.getElementById('orderForm').reset();
    });

    // Update operation
    function updateStatus(index, newStatus) {
      orders[index].status = newStatus;
      saveOrders();
    }

    // Delete operation
    function deleteOrder(index) {
      if (confirm("Are you sure you want to delete this order?")) {
        orders.splice(index, 1);
        saveOrders();
      }
    }

    // Initial render
    renderOrders();
  </script>
</body>
</html>
