<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delivery Tracker - Phase 1 Auth</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 30px;
      background-color: #f4f7f6;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h1, h2 {
      text-align: center;
      color: #333;
    }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }
    input, select {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      background-color: #4CAF50;
      color: white;
      padding: 10px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover {
      background-color: #45a049;
    }
    .quick-login {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 15px;
    }
    .btn-quick {
      background-color: #008CBA;
      padding: 8px;
      font-size: 14px;
    }
    .btn-quick:hover {
      background-color: #007ba7;
    }
    .btn-logout {
      background-color: #f44336;
      margin-top: 20px;
    }
    .btn-logout:hover {
      background-color: #da190b;
    }
    .alert {
      padding: 10px;
      background-color: #f8d7da;
      color: #721c24;
      border-radius: 4px;
      margin-bottom: 15px;
      display: none;
    }
    .success {
      background-color: #d4edda;
      color: #155724;
    }
    .hidden {
      display: none;
    }
    .profile-card {
      background-color: #e2e3e5;
      padding: 15px;
      border-radius: 6px;
      margin-top: 15px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Delivery Tracker - Phase 1</h1>
    
    <div id="alert-box" class="alert"></div>

    <!-- Login Module -->
    <div id="login-view">
      <h2>Account Login</h2>
      <form id="loginForm">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="login-email" required placeholder="name@domain.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" required placeholder="••••••••">
        </div>
        <button type="submit">Log In</button>
      </form>

      <div class="quick-login">
        <h3>Quick Access Testing Profiles:</h3>
        <button class="btn-quick" onclick="quickLogin('admin@aislop.delivery', 'admin123')">👑 Admin (admin@aislop.delivery)</button>
        <button class="btn-quick" onclick="quickLogin('customer@aislop.delivery', 'customer123')">👤 Customer (customer@aislop.delivery)</button>
        <button class="btn-quick" onclick="quickLogin('agent1@aislop.delivery', 'agent123')">🛵 Rider Agent (agent1@aislop.delivery)</button>
      </div>

      <p style="text-align: center; margin-top: 20px;">
        Need an account? <a href="#" onclick="toggleAuthViews(true)">Register here</a>
      </p>
    </div>

    <!-- Register Module -->
    <div id="register-view" class="hidden">
      <h2>Customer Registration</h2>
      <form id="registerForm">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="reg-name" required placeholder="John Doe">
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="reg-email" required placeholder="john@domain.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="reg-password" required placeholder="password123">
        </div>
        <button type="submit">Create Account</button>
      </form>
      <p style="text-align: center; margin-top: 20px;">
        Already registered? <a href="#" onclick="toggleAuthViews(false)">Login here</a>
      </p>
    </div>

    <!-- Dashboard/Session View -->
    <div id="dashboard-view" class="hidden">
      <h2>Session Workspace</h2>
      <div class="profile-card">
        <p><strong>Logged in User:</strong> <span id="session-name">Name</span></p>
        <p><strong>System Role:</strong> <span id="session-role">Role</span></p>
        <p><strong>Token Status:</strong> Active 🟢</p>
      </div>
      <button class="btn-logout" onclick="logout()">Terminate Session (Logout)</button>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin;
    let token = localStorage.getItem('delivery_token') || null;

    document.addEventListener('DOMContentLoaded', () => {
      if (token) {
        checkSession();
      }
      document.getElementById('loginForm').addEventListener('submit', handleLogin);
      document.getElementById('registerForm').addEventListener('submit', handleRegister);
    });

    function showAlert(msg, isSuccess = false) {
      const alertBox = document.getElementById('alert-box');
      alertBox.innerText = msg;
      alertBox.style.display = 'block';
      if (isSuccess) {
        alertBox.classList.add('success');
      } else {
        alertBox.classList.remove('success');
      }
    }

    function hideAlert() {
      document.getElementById('alert-box').style.display = 'none';
    }

    function toggleAuthViews(showRegister) {
      hideAlert();
      if (showRegister) {
        document.getElementById('login-view').classList.add('hidden');
        document.getElementById('register-view').classList.remove('hidden');
      } else {
        document.getElementById('login-view').classList.remove('hidden');
        document.getElementById('register-view').classList.add('hidden');
      }
    }

    async function handleLogin(e) {
      e.preventDefault();
      hideAlert();
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;

      try {
        const res = await fetch(`${API_BASE}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Login failed.');
        
        token = data.token;
        localStorage.setItem('delivery_token', token);
        showDashboard(data.user);
      } catch (err) {
        showAlert(err.message);
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      hideAlert();
      const name = document.getElementById('reg-name').value;
      const email = document.getElementById('reg-email').value;
      const password = document.getElementById('reg-password').value;

      try {
        const res = await fetch(`${API_BASE}/api/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password, role: 'customer' })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Registration failed.');

        showAlert('Registration successful! Please login.', true);
        toggleAuthViews(false);
        document.getElementById('login-email').value = email;
        document.getElementById('login-password').value = password;
      } catch (err) {
        showAlert(err.message);
      }
    }

    function quickLogin(email, password) {
      document.getElementById('login-email').value = email;
      document.getElementById('login-password').value = password;
      document.getElementById('loginForm').dispatchEvent(new Event('submit'));
    }

    async function checkSession() {
      try {
        const res = await fetch(`${API_BASE}/api/auth/me`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        if (res.ok) {
          showDashboard(data.user);
        } else {
          logout();
        }
      } catch (e) {
        logout();
      }
    }

    function showDashboard(user) {
      document.getElementById('login-view').classList.add('hidden');
      document.getElementById('register-view').classList.add('hidden');
      document.getElementById('dashboard-view').classList.remove('hidden');
      document.getElementById('session-name').innerText = user.name || user.email;
      document.getElementById('session-role').innerText = user.role.toUpperCase();
    }

    function logout() {
      token = null;
      localStorage.removeItem('delivery_token');
      document.getElementById('dashboard-view').classList.add('hidden');
      document.getElementById('login-view').classList.remove('hidden');
      hideAlert();
    }
  </script>
</body>
</html>
